apiVersion: apps/v1
kind: Deployment
metadata:
  name: webuild-it
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webuild-it
  template:
    metadata:
      labels:
        app: webuild-it
    spec:
      containers:
        - name: webuild-it
          image: ghcr.io/turcan-vasile/webuild-it:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
